<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#ff4d6d" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="SheSafe" />
        <link rel="stylesheet" href="/css/style.css" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" /> 
    <title>SheSafe - Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --pink: #ff4d6d;
            --dark-pink: #c9184a;
            --soft: #fff0f3;
            --white: #ffffff;
            --gray: #6c757d;
            --dark: #1a1a2e;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-image: radial-gradient(circle at 20% 50%, #ff4d6d22 0%, transparent 50%),
                              radial-gradient(circle at 80% 20%, #c9184a22 0%, transparent 50%);
        }

        .card {
            background: var(--white);
            border-radius: 28px;
            padding: 40px 36px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 30px 80px rgba(255, 77, 109, 0.2);
            animation: slideUp 0.6s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            text-align: center;
            margin-bottom: 28px;
        }

        .logo-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--pink), var(--dark-pink));
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin: 0 auto 12px;
            box-shadow: 0 8px 20px rgba(255, 77, 109, 0.4);
        }

        .logo h1 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            color: var(--dark);
        }

        .logo p {
            font-size: 13px;
            color: var(--gray);
            margin-top: 4px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--dark);
            margin-bottom: 7px;
        }

        input {
            width: 100%;
            padding: 13px 16px;
            border: 2px solid #f0f0f0;
            border-radius: 12px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            color: var(--dark);
            transition: all 0.3s ease;
            outline: none;
            background: #fafafa;
        }

        input:focus {
            border-color: var(--pink);
            background: var(--white);
            box-shadow: 0 0 0 4px rgba(255, 77, 109, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--pink), var(--dark-pink));
            color: white;
            border: none;
            border-radius: 12px;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(255, 77, 109, 0.35);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(255, 77, 109, 0.45);
        }

        .btn:active {
            transform: translateY(0);
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: var(--gray);
        }

        .login-link a {
            color: var(--pink);
            text-decoration: none;
            font-weight: 500;
        }

        .message {
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
            text-align: center;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }

        .btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <div class="logo-icon">🛡️</div>
            <h1>SheSafe</h1>
            <p>Create your safe space</p>
        </div>

        <div class="message" id="message"></div>

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="full_name" placeholder="Enter your full name" />
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="Enter your email" />
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" id="phone" placeholder="Enter your phone number" />
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Create a password" />
        </div>

        <button class="btn" id="registerBtn" onclick="register()">
            Create Account
        </button>

        <div class="login-link">
            Already have an account? <a href="index.html">Login here</a>
        </div>
    </div>

    <script>
        async function register() {
            // Get values from input fields
            const full_name = document.getElementById('full_name').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('registerBtn');
            const msg = document.getElementById('message');

            // Reset message
            msg.className = 'message';
            msg.textContent = '';

            // Basic validation
            if (!full_name || !email || !password) {
                msg.className = 'message error';
                msg.textContent = '⚠️ Please fill in all required fields!';
                return;
            }

            // Disable button while processing
            btn.disabled = true;
            btn.textContent = 'Creating account...';

            try {
                // Send data to our backend
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ full_name, email, password, phone })
                });

                const data = await response.json();

                if (data.success) {
                    msg.className = 'message success';
                    msg.textContent = '✅ Account created! Redirecting to login...';
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                } else {
                    msg.className = 'message error';
                    msg.textContent = '❌ ' + data.message;
                }
            } catch (err) {
                msg.className = 'message error';
                msg.textContent = '❌ Something went wrong. Please try again.';
            }

            // Re-enable button
            btn.disabled = false;
            btn.textContent = 'Create Account';
        }

        // Allow pressing Enter to submit
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') register();
        });
    </script>
</body>
</html>
