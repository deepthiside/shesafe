<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SheSafe - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --pink: #ff4d6d;
            --dark-pink: #c9184a;
            --soft: #fff0f3;
            --white: #ffffff;
            --gray: #6c757d;
            --dark: #1a1a2e;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-image: radial-gradient(circle at 20% 50%, #ff4d6d22 0%, transparent 50%),
                              radial-gradient(circle at 80% 20%, #c9184a22 0%, transparent 50%);
        }

        .card {
            background: var(--white);
            border-radius: 28px;
            padding: 40px 36px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 30px 80px rgba(255, 77, 109, 0.2);
            animation: slideUp 0.6s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--pink), var(--dark-pink));
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin: 0 auto 12px;
            box-shadow: 0 8px 20px rgba(255, 77, 109, 0.4);
        }

        .logo h1 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            color: var(--dark);
        }

        .logo p {
            font-size: 13px;
            color: var(--gray);
            margin-top: 4px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--dark);
            margin-bottom: 7px;
        }

        input {
            width: 100%;
            padding: 13px 16px;
            border: 2px solid #f0f0f0;
            border-radius: 12px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            color: var(--dark);
            transition: all 0.3s ease;
            outline: none;
            background: #fafafa;
        }

        input:focus {
            border-color: var(--pink);
            background: var(--white);
            box-shadow: 0 0 0 4px rgba(255, 77, 109, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--pink), var(--dark-pink));
            color: white;
            border: none;
            border-radius: 12px;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(255, 77, 109, 0.35);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(255, 77, 109, 0.45);
        }

        .btn:active {
            transform: translateY(0);
        }

        .register-link {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: var(--gray);
        }

        .register-link a {
            color: var(--pink);
            text-decoration: none;
            font-weight: 500;
        }

        .message {
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
            text-align: center;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }

        .btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .welcome-text {
            text-align: center;
            margin-bottom: 28px;
        }

        .welcome-text h2 {
            font-size: 20px;
            color: var(--dark);
            font-weight: 500;
        }

        .welcome-text p {
            font-size: 13px;
            color: var(--gray);
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <div class="logo-icon">🛡️</div>
            <h1>SheSafe</h1>
            <p>Your private family safety hub</p>
        </div>

        <div class="welcome-text">
            <h2>Welcome back 👋</h2>
            <p>Login to access your safety circle</p>
        </div>

        <div class="message" id="message"></div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="Enter your email" />
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter your password" />
        </div>

        <button class="btn" id="loginBtn" onclick="login()">
            Login to SheSafe
        </button>

        <div class="register-link">
            Don't have an account? <a href="register.html">Register here</a>
        </div>
    </div>

    <script>
        // Check if already logged in
        window.onload = async () => {
            const res = await fetch('/api/auth/check');
            const data = await res.json();
            if (data.loggedIn) {
                window.location.href = 'dashboard.html';
            }
        };

        async function login() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const msg = document.getElementById('message');

            // Reset message
            msg.className = 'message';
            msg.textContent = '';

            // Basic validation
            if (!email || !password) {
                msg.className = 'message error';
                msg.textContent = '⚠️ Please enter email and password!';
                return;
            }

            // Disable button while processing
            btn.disabled = true;
            btn.textContent = 'Logging in...';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (data.success) {
                    msg.className = 'message success';
                    msg.textContent = '✅ Login successful! Redirecting...';
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                } else {
                    msg.className = 'message error';
                    msg.textContent = '❌ ' + data.message;
                }
            } catch (err) {
                msg.className = 'message error';
                msg.textContent = '❌ Something went wrong. Please try again.';
            }

            btn.disabled = false;
            btn.textContent = 'Login to SheSafe';
        }

        // Allow pressing Enter to submit
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>


<!-- ---

> **What this page does:**
> - Same beautiful SheSafe design as register page
> - Auto-redirects to dashboard if already logged in
> - Sends email & password to `/api/auth/login`
> - On success redirects to `dashboard.html`
> - On fail shows error message

--- -->
